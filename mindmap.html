<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelScript - Mind Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mindmap.css">
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">Mind Map</div>
        <div class="tab active" data-target="corkboard">Scene Corkboard</div>
        <div class="tab" data-target="character-bible">Character Bible</div>
        <div class="tab" data-target="freeform">Freeform Board</div>
    </div>

    <div id="content">
        <div class="global-toolbar">
            <button id="btn-toggle-collapse">Toggle Size</button>
            <button id="btn-sort-cards">Reset Layout</button>
            <button id="add-sticky-btn" style="display:none;">+ Add Note</button>
        </div>
        <!-- Corkboard View -->
        <div id="corkboard" class="view active">
            <div id="corkboard-canvas"></div>
        </div>

        <!-- Character Bible View -->
        <div id="character-bible" class="view">
            <div id="character-bible-canvas"></div>
        </div>

        <!-- Freeform Board View -->
        <div id="freeform" class="view">
            <div id="freeform-canvas"></div>
        </div>
    </div>

    <div id="card-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div id="modal-title" class="modal-title">Title</div>
                <button id="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">Body</div>
            <div class="modal-notes-label">Notes & Details:</div>
            <div id="modal-notes" class="modal-notes" contenteditable="true"></div>
        </div>
    </div>

    <script src="mindmap.js"></script>
</body>
</html>
